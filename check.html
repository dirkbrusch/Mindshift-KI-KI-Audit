<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>KI-Team-Audit · Mindshift AI</title>
<meta name="description" content="3-Minuten-Self-Assessment zur KI-Reife Ihres Teams. Mit SHIFT-Verortung und konkreten Handlungsempfehlungen." />
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
  :root {
    --gold:        #C1A355;
    --gold-light:  #D4BC7B;
    --gold-pale:   #EDE3C8;
    --gold-dark:   #9E8440;
    --gold-glow:   rgba(193,163,85,.18);
    --navy:        #0A1628;
    --navy-mid:    #132035;
    --navy-light:  #1B2D47;
    --slate:       #1A3A5C;
    --white:       #FFFFFF;
    --off-white:   #F9F8F5;
    --cream:       #F4F0E7;
    --stone-50:    #EDEAE3;
    --stone-100:   #DEDAD0;
    --stone-300:   #B0AA9D;
    --stone-500:   #7A756A;
    --stone-700:   #4A463D;
    --ink:         #1E1C18;
    --red-soft:    #C45B4A;
    --yellow-soft: #C99A3D;
    --green-soft:  #5A9E6F;
    --ff-display:  'Playfair Display', Georgia, serif;
    --ff-body:     'Inter', -apple-system, sans-serif;
    --ease:        cubic-bezier(.4,0,.2,1);
    --ease-spring: cubic-bezier(.34,1.56,.64,1);
    --shadow-s:    0 2px 8px rgba(10,22,40,.05);
    --shadow-m:    0 8px 32px rgba(10,22,40,.08);
    --shadow-l:    0 24px 64px rgba(10,22,40,.12);
    --shadow-gold: 0 8px 32px rgba(193,163,85,.22);
    --radius:      14px;
    --radius-lg:   22px;

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--ff-body);
    background: var(--off-white);
    color: var(--ink);
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;

  h1, h2, h3, h4 { font-family: var(--ff-display); font-weight: 700; color: var(--navy); line-height: 1.15; margin: 0; }
  h1 { font-size: clamp(1.8rem, 3.2vw, 2.8rem); }
  h2 { font-size: clamp(1.5rem, 2.5vw, 2rem); }
  h3 { font-size: 1.2rem; }
  p { margin: 0; color: var(--stone-700); }
  button { font-family: var(--ff-body); cursor: pointer; border: none; }
  .shell {
    max-width: 780px;
    margin: 0 auto;
    padding: 48px 24px 96px;
  }
  @media (max-width: 640px) { .shell { padding: 24px 16px 64px; } }

  .brand-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 40px;
    font-family: var(--ff-display);
    font-weight: 700;
    color: var(--navy);
    letter-spacing: -0.01em;
    font-size: 1.1rem;
  }
  .brand-header .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--gold); }
  .brand-header .tag { font-family: var(--ff-body); font-weight: 400; font-size: 0.85rem; color: var(--stone-500); margin-left: auto; }

  .progress {
    height: 3px;
    background: var(--stone-100);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 40px;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--gold-dark), var(--gold));
    transition: width 0.5s var(--ease);
  }

  .card {
    background: var(--white);
    border: 1px solid var(--stone-100);
    border-radius: var(--radius-lg);
    padding: 40px;
    box-shadow: var(--shadow-s);
  }
  @media (max-width: 640px) { .card { padding: 24px; } }

  .kicker {
    font-family: var(--ff-body);
    font-size: 0.72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--gold-dark);
    margin-bottom: 16px;
  }

  .question {
    font-family: var(--ff-display);
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--navy);
    line-height: 1.35;
    margin-bottom: 20px;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 24px;
  }
  .option {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 20px;
    background: var(--white);
    border: 1.5px solid var(--stone-100);
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.2s var(--ease);
    text-align: left;
    width: 100%;
    font-size: 0.98rem;
    color: var(--ink);
  }
  .option:hover { border-color: var(--gold-light); background: var(--cream); }
  .option.selected {
    border-color: var(--gold);
    background: var(--cream);
    box-shadow: var(--shadow-gold);
  }
  .option .dot-box {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 2px solid var(--stone-300);
    flex-shrink: 0;
    transition: all 0.2s var(--ease);
  }
  .option.selected .dot-box {
    border-color: var(--gold);
    background: var(--gold);
    box-shadow: inset 0 0 0 3px var(--white);
  }

  .likert-row {
    margin-bottom: 28px;
  }
  .likert-q {
    font-size: 1.02rem;
    color: var(--navy);
    font-weight: 500;
    margin-bottom: 14px;
    line-height: 1.4;
  }
  .likert-scale {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
  }
  .likert-btn {
    padding: 12px 4px;
    border: 1.5px solid var(--stone-100);
    background: var(--white);
    border-radius: 10px;
    font-weight: 600;
    font-size: 0.95rem;
    color: var(--stone-500);
    transition: all 0.15s var(--ease);
    cursor: pointer;
  }
  .likert-btn:hover { border-color: var(--gold-light); color: var(--navy); }
  .likert-btn.selected {
    background: var(--navy);
    color: var(--white);
    border-color: var(--navy);
  }
  .likert-labels {
    display: flex;
    justify-content: space-between;
    margin-top: 6px;
    font-size: 0.72rem;
    color: var(--stone-500);
  }

  .actions {
    display: flex;
    justify-content: space-between;
    margin-top: 32px;
    gap: 12px;
  }
  .btn {
    padding: 14px 28px;
    border-radius: 100px;
    font-weight: 600;
    font-size: 0.95rem;
    transition: all 0.2s var(--ease);
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .btn-primary {
    background: var(--navy);
    color: var(--white);
  }
  .btn-primary:hover:not(:disabled) {
    background: var(--navy-light);
    transform: translateY(-1px);
    box-shadow: var(--shadow-m);
  }
  .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn-gold {
    background: var(--gold);
    color: var(--navy);
  }
  .btn-gold:hover { background: var(--gold-light); box-shadow: var(--shadow-gold); transform: translateY(-1px); }
  .btn-ghost {
    background: transparent;
    color: var(--stone-500);
  }
  .btn-ghost:hover { color: var(--navy); }

  .hero-text {
    font-family: var(--ff-display);
    font-size: clamp(1.8rem, 3.2vw, 2.6rem);
    font-weight: 700;
    color: var(--navy);
    line-height: 1.2;
    margin-bottom: 16px;
  }
  .hero-text em {
    font-style: italic;
    background: linear-gradient(135deg, var(--gold), var(--gold-dark));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .hero-sub {
    font-size: 1.1rem;
    color: var(--stone-500);
    margin-bottom: 32px;
    max-width: 560px;
  }
  .hero-meta {
    display: flex;
    gap: 32px;
    flex-wrap: wrap;
    font-size: 0.85rem;
    color: var(--stone-500);
  }
  .hero-meta span strong { color: var(--navy); font-weight: 600; }

  /* Results styles */
  .shift-track {
    position: relative;
    margin: 40px 0 48px;
    padding: 0 12px;
  }
  .shift-rail {
    position: relative;
    height: 2px;
    background: var(--stone-100);
    margin: 36px 0;
  }
  .shift-fill {
    position: absolute;
    left: 0;
    top: 0;
    height: 100%;
    background: linear-gradient(90deg, var(--gold-dark), var(--gold));
    transition: width 0.8s var(--ease);
  }
  .shift-phase {
    position: absolute;
    transform: translateX(-50%);
    top: -36px;
    text-align: center;
    width: 110px;
  }
  .shift-phase .phase-dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--stone-100);
    border: 2px solid var(--white);
    margin: 0 auto;
    transition: all 0.4s var(--ease);
  }
  .shift-phase.passed .phase-dot { background: var(--gold); }
  .shift-phase.current .phase-dot {
    background: var(--navy);
    width: 22px;
    height: 22px;
    margin-top: -4px;
    box-shadow: 0 0 0 6px rgba(10,22,40,0.08);
  }
  .shift-phase .phase-label {
    font-size: 0.72rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--stone-500);
    margin-top: 12px;
  }
  .shift-phase.current .phase-label { color: var(--navy); font-weight: 700; }
  .breakpoint-callout {
    background: var(--cream);
    border: 1px solid var(--gold-pale);
    border-radius: var(--radius);
    padding: 20px 24px;
    margin-bottom: 32px;
  }
  .breakpoint-callout .kicker { color: var(--gold-dark); margin-bottom: 8px; }
  .breakpoint-callout h3 { margin-bottom: 6px; }

  .dim-bar-row {
    display: grid;
    grid-template-columns: 140px 1fr 56px 100px;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--stone-50);
    font-size: 0.95rem;
  }
  @media (max-width: 640px) {
    .dim-bar-row { grid-template-columns: 1fr 48px; grid-template-rows: auto auto; font-size: 0.9rem; }
    .dim-bar-row .bar-track { grid-column: 1 / -1; }
    .dim-bar-row .zone-label { grid-column: 1 / -1; margin-top: 4px; }
  }
  .dim-label { font-weight: 500; color: var(--navy); }
  .bar-track {
    height: 10px;
    background: var(--stone-100);
    border-radius: 5px;
    overflow: hidden;
  }
  .bar-fill { height: 100%; border-radius: 5px; transition: width 0.8s var(--ease); }
  .bar-fill.green { background: var(--green-soft); }
  .bar-fill.yellow { background: var(--yellow-soft); }
  .bar-fill.red { background: var(--red-soft); }
  .dim-score { font-weight: 700; text-align: right; color: var(--navy); }
  .zone-label { font-size: 0.78rem; font-weight: 600; }
  .zone-label.green { color: var(--green-soft); }
  .zone-label.yellow { color: var(--yellow-soft); }
  .zone-label.red { color: var(--red-soft); }

  .recommendation {
    padding: 28px;
    border: 1px solid var(--stone-100);
    border-radius: var(--radius);
    margin-bottom: 20px;
    background: var(--white);
  }
  .recommendation.primary {
    border-color: var(--gold);
    box-shadow: var(--shadow-gold);
  }
  .rec-header {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 8px;
    flex-wrap: wrap;
  }
  .rec-number {
    font-family: var(--ff-display);
    font-weight: 700;
    font-size: 1.3rem;
    color: var(--gold-dark);
  }
  .rec-title {
    font-family: var(--ff-display);
    font-weight: 700;
    font-size: 1.2rem;
    color: var(--navy);
    flex: 1;
    min-width: 240px;
  }
  .rec-meta {
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--stone-500);
    display: flex;
    gap: 16px;
    margin-bottom: 16px;
  }
  .rec-meta span { display: flex; align-items: center; gap: 6px; }
  .rec-body { margin-bottom: 16px; }
  .rec-steps { list-style: none; padding: 0; margin: 0 0 16px; }
  .rec-steps li {
    padding: 10px 0 10px 28px;
    position: relative;
    color: var(--ink);
    font-size: 0.96rem;
    line-height: 1.5;
    border-bottom: 1px solid var(--stone-50);
  }
  .rec-steps li:last-child { border-bottom: none; }
  .rec-steps li::before {
    content: attr(data-step);
    position: absolute;
    left: 0;
    top: 12px;
    color: var(--gold-dark);
    font-weight: 700;
    font-size: 0.85rem;
  }
  .rec-why {
    font-size: 0.88rem;
    color: var(--stone-500);
    border-left: 2px solid var(--gold);
    padding: 4px 0 4px 14px;
    font-style: italic;
  }
  .rec-pitfall {
    margin-top: 12px;
    font-size: 0.85rem;
    color: var(--stone-700);
    background: var(--off-white);
    padding: 10px 14px;
    border-radius: 8px;
  }
  .rec-pitfall strong { color: var(--red-soft); font-weight: 600; }

  .time-plan {
    display: grid;
    grid-template-columns: 160px 1fr;
    gap: 12px 20px;
    margin: 8px 0;
    align-items: center;
  }
  @media (max-width: 640px) { .time-plan { grid-template-columns: 1fr; gap: 4px 0; padding: 12px 0; border-bottom: 1px solid var(--stone-50); } }
  .time-plan-label {
    font-size: 0.78rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--gold-dark);
  }
  .time-plan-text { color: var(--ink); }

  .reflection {
    background: var(--navy);
    color: var(--white);
    padding: 32px 28px;
    border-radius: var(--radius-lg);
    margin: 32px 0;
  }
  .reflection .kicker { color: var(--gold-light); }
  .reflection p { font-family: var(--ff-display); font-style: italic; font-size: 1.15rem; color: var(--white); line-height: 1.5; }

  .cta-box {
    background: linear-gradient(165deg, var(--navy), var(--navy-mid));
    color: var(--white);
    padding: 40px;
    border-radius: var(--radius-lg);
    margin: 32px 0;
    text-align: left;
  }
  .cta-box .kicker { color: var(--gold); }
  .cta-box h3 { color: var(--white); margin-bottom: 12px; }
  .cta-box p { color: rgba(255,255,255,0.78); margin-bottom: 20px; }
  .cta-note { font-size: 0.85rem; color: var(--stone-300); margin-top: 12px; }

  .section-title {
    font-family: var(--ff-body);
    font-size: 0.82rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--gold-dark);
    margin: 40px 0 16px;
  }

  .variant-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  @media (max-width: 640px) { .variant-grid { grid-template-columns: 1fr; } }
  .variant-card {
    padding: 32px 28px;
    border: 1.5px solid var(--stone-100);
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.2s var(--ease);
    text-align: left;
    background: var(--white);
  }
  .variant-card:hover { border-color: var(--gold); box-shadow: var(--shadow-m); transform: translateY(-2px); }
  .variant-card h3 { margin-bottom: 10px; }
  .variant-card p { font-size: 0.92rem; }
  .variant-card .icon { font-size: 1.6rem; margin-bottom: 12px; }

  .leitfragen {
    background: var(--cream);
    border-radius: var(--radius);
    padding: 28px;
    margin: 24px 0;
  }
  .leitfragen h4 { font-family: var(--ff-display); font-weight: 700; color: var(--navy); margin-bottom: 14px; font-size: 1.1rem; }
  .leitfragen ol { margin: 0; padding-left: 24px; }
  .leitfragen li { margin-bottom: 10px; color: var(--ink); line-height: 1.5; }

  .footer-meta {
    margin-top: 64px;
    padding-top: 24px;
    border-top: 1px solid var(--stone-100);
    font-size: 0.8rem;
    color: var(--stone-500);
    text-align: center;
  }

  /* Fade transitions */
  .fade-in { animation: fadeIn 0.4s var(--ease) both; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>

// Mapping: Dimension-ID -> Liste der Interventions-IDs (für Deep-Check-Routing)
const DIM_INTERVENTIONS = {
  sinnverlust:        ['SV-1','SV-2','SV-3','SV-4'],
  kompetenzangst:     ['KA-1','KA-2','KA-3','KA-4'],
  fuehrungsvakuum:    ['FV-1','FV-2','FV-3','FV-4'],
  tempostress:        ['TS-1','TS-2','TS-3','TS-4'],
  entscheidungsangst: ['EA-1','EA-2','EA-3'],
  eigenverantwortung: ['EV-1','EV-2','EV-3'],
  chancenbewusstsein: ['CB-1','CB-2','CB-3'],
  strategische_klarheit: ['SK-1','SK-2','SK-3'],
  roi:                ['RO-1','RO-2','RO-3'],
  daten_compliance:   ['DC-1','DC-2','DC-3'],
  governance:         ['GV-1','GV-2','GV-3'],
  lernarchitektur:    ['LA-1','LA-2','LA-3'],
};

const PHASE_INTERVENTIONS = {
  VOR_SENSE: { primary: ['OR-1'], secondary: ['SV-4','FV-4'] },
  SENSE:     { primary: ['OR-1','SV-4','FV-4'], secondary: ['KA-4'] },
  HUMAN:     { primary: ['FV-1', 'KA-1', 'KA-4', 'SV-2'], secondary: ['FV-4', 'KA-3'] },
  IGNITE:    { primary: ['KA-2', 'TS-4', 'SV-1', 'SV-3'], secondary: ['SV-2', 'KA-1'] },
  FRAME:     { primary: ['TS-1', 'TS-2', 'FV-2', 'KA-3'], secondary: ['TS-3', 'FV-3'] },
  THRIVE:    { primary: ['FV-3'], note: 'Minimalinvasiv – Führung tritt zurück.' },
};

/* ===================== SCORING & MAPPING ===================== */

function computeScores(answers) {
  const dimScore = (items) => {
    const vals = items.map(it => answers[it.id]);
    if (vals.some(v => !v)) return null;
    return Math.round(vals.reduce((a,b)=>a+b, 0) * 100 / (vals.length * 5));
  };
  const scores = {};
  DIMENSIONS.forEach(d => {
    const s = dimScore(d.items);
    if (s !== null) scores[d.id] = s;
  });
  // Gesamt = Durchschnitt der Quick-Check-Dimensionen (Block A, erste 4) für SHIFT-Mapping-Kompatibilität
  const quickScores = ['sinnverlust','kompetenzangst','fuehrungsvakuum','tempostress']
    .map(id => scores[id]).filter(s => s !== undefined);
  scores.gesamt = quickScores.length === 4 ? Math.round(quickScores.reduce((a,b)=>a+b,0) / 4) : null;
  return scores;
}

function zone(score) {
  if (score === null || score === undefined) return 'grey';
  if (score < 34) return 'green';
  if (score < 67) return 'yellow';
  return 'red';
}

function barrierPoint(scores) {
  // Nur aus den 4 Quick-Check-Dim für SHIFT-Mapping-Kompatibilitaet
  const quickIds = ['sinnverlust','kompetenzangst','fuehrungsvakuum','tempostress'];
  const entries = quickIds
    .map(id => [id, scores[id]])
    .filter(([, v]) => v !== undefined);
  entries.sort((a, b) => b[1] - a[1]);
  return entries[0] ? entries[0][0] : null;
}

function topDimension(scores) {
  // Haechster Score ueber ALLE Dimensionen (inkl. Deep) fuer Display
  const entries = Object.entries(scores).filter(([k]) => k !== 'gesamt' && typeof scores[k] === 'number');
  entries.sort((a, b) => b[1] - a[1]);
  return entries[0] ? entries[0][0] : null;
}

function mapShift(scores, ctx) {
  // Rule 1: Vor SENSE
  if (ctx.C1 === 'kein-einsatz' && ctx.C4 === 'keine') return 'VOR_SENSE';

  // Rule 2: THRIVE (M7 — Block-Avg statt Per-Dim, realistischer)
  const quickVals = ['sinnverlust','kompetenzangst','fuehrungsvakuum','tempostress']
    .map(k => scores[k]).filter(v => v != null);
  const quickAvg = quickVals.length ? quickVals.reduce((a,b) => a+b, 0) / quickVals.length : 0;
  if (quickAvg < 34 && ctx.C1 === 'integriert' && ctx.C3 === 'geregelt' && ctx.C4 === 'systematisch') return 'THRIVE';

  const bp = barrierPoint(scores);
  const bpScore = scores[bp];
  const anyDimRisk = scores.sinnverlust >= 34 || scores.kompetenzangst >= 34 || scores.fuehrungsvakuum >= 34 || scores.tempostress >= 34;

  // M1: SENSE priorisiert vor HUMAN bei fruehen Einsatz-Stadien
  // Wenn C1 = kein-einsatz oder explorativ UND irgendeine Dim >= 34 → SENSE
  if ((ctx.C1 === 'kein-einsatz' || ctx.C1 === 'explorativ') && anyDimRisk) return 'SENSE';

  // Rule: FRAME
  if (bp === 'tempostress' && bpScore >= 34 && (ctx.C1 === 'etabliert' || ctx.C1 === 'integriert')) return 'FRAME';

  // Rule: IGNITE
  if (bp === 'sinnverlust' && bpScore >= 34 && (ctx.C1 === 'etabliert' || ctx.C1 === 'integriert')
      && (ctx.C2 === 'automation' || ctx.C2 === 'unklar')) return 'IGNITE';

  // Rule: HUMAN — verlangt nun explizit C1 ∈ {etabliert, integriert}
  if ((bp === 'kompetenzangst' || bp === 'fuehrungsvakuum') && bpScore >= 34
      && (ctx.C1 === 'etabliert' || ctx.C1 === 'integriert')
      && (['fehlend','restriktiv','informell'].includes(ctx.C3) || ['keine','autodidaktisch'].includes(ctx.C4))) return 'HUMAN';

  // Fallback: HUMAN wenn irgendwas brennt, sonst SENSE (Standort klaeren)
  if (anyDimRisk) return 'HUMAN';
  return 'SENSE';
}

// Fix B: Kontext-sensitive Auswahl innerhalb einer Dim-Intervention-Liste
// Macht alle 3+ Varianten jeder Dim erreichbar — nicht nur die ersten 2
function selectDimInterventions(dim, ctx, phase) {
  const pool = DIM_INTERVENTIONS[dim] || [];
  if (pool.length <= 2) return pool.slice(0, 2);
  if (dim === 'sinnverlust') {
    if (ctx.C2 === 'automation') return [pool[3], pool[0]];              // SV-4, SV-1
    if (ctx.C2 === 'augmentation' || ctx.C2 === 'beides') return [pool[0], pool[2]];  // SV-1, SV-3
    return [pool[0], pool[1]];                                           // SV-1, SV-2
  }
  if (dim === 'kompetenzangst') {
    if (ctx.C4 === 'systematisch') return [pool[2], pool[3]];            // KA-3, KA-4
    if (ctx.C4 === 'punktuell') return [pool[1], pool[3]];               // KA-2, KA-4
    return [pool[0], pool[1]];                                           // KA-1, KA-2
  }
  if (dim === 'fuehrungsvakuum') {
    if (phase === 'FRAME' || ctx.C1 === 'integriert') return [pool[1], pool[2]]; // FV-2, FV-3
    if (phase === 'SENSE' || phase === 'VOR_SENSE') return [pool[3], pool[0]]; // FV-4, FV-1
    if (ctx.C3 === 'informell' || ctx.C3 === 'geregelt') return [pool[0], pool[1]]; // FV-1, FV-2
    return [pool[0], pool[3]];                                           // FV-1, FV-4
  }
  if (dim === 'tempostress') {
    if (ctx.C1 === 'integriert') return [pool[1], pool[0]];              // TS-2, TS-1
    if (phase === 'IGNITE' || ctx.C2 === 'beides') return [pool[3], pool[0]]; // TS-4, TS-1
    if (ctx.C3 === 'geregelt' || ctx.C3 === 'informell') return [pool[2], pool[0]]; // TS-3, TS-1
    return [pool[0], pool[1]];                                           // TS-1, TS-2
  }
  if (dim === 'entscheidungsangst') {
    if (ctx.C3 === 'restriktiv' || ctx.C3 === 'geregelt') return [pool[0], pool[2]];  // EA-1, EA-3
    if (ctx.C1 === 'integriert') return [pool[1], pool[2]];              // EA-2, EA-3
    return [pool[0], pool[1]];                                           // EA-1, EA-2
  }
  if (dim === 'eigenverantwortung') {
    if (ctx.C3 === 'fehlend' || ctx.C3 === 'restriktiv') return [pool[1], pool[0]]; // EV-2, EV-1
    if (ctx.C4 === 'systematisch') return [pool[2], pool[0]];            // EV-3, EV-1
    return [pool[0], pool[2]];                                           // EV-1, EV-3
  }
  if (dim === 'chancenbewusstsein') {
    if (ctx.C2 === 'automation') return [pool[0], pool[1]];              // CB-1, CB-2
    if (ctx.C1 === 'kein-einsatz' || ctx.C1 === 'explorativ') return [pool[2], pool[0]]; // CB-3, CB-1
    return [pool[1], pool[2]];                                           // CB-2, CB-3
  }
  if (dim === 'strategische_klarheit') {
    if (ctx.C1 === 'integriert') return [pool[1], pool[2]];              // SK-2, SK-3
    if (ctx.C2 === 'automation') return [pool[2], pool[0]];              // SK-3, SK-1
    return [pool[0], pool[1]];                                           // SK-1, SK-2
  }
  if (dim === 'roi') {
    if (ctx.C4 === 'systematisch' || ctx.C4 === 'punktuell') return [pool[1], pool[2]]; // RO-2, RO-3
    if (ctx.C1 === 'integriert') return [pool[2], pool[0]];              // RO-3, RO-1
    return [pool[0], pool[1]];                                           // RO-1, RO-2
  }
  if (dim === 'daten_compliance') {
    if (ctx.C3 === 'fehlend') return [pool[0], pool[2]];                 // DC-1, DC-3
    if (ctx.C4 === 'keine' || ctx.C4 === 'autodidaktisch') return [pool[1], pool[0]]; // DC-2, DC-1
    return [pool[0], pool[1]];                                           // DC-1, DC-2
  }
  if (dim === 'governance') {
    if (ctx.C3 === 'fehlend') return [pool[1], pool[0]];                 // GV-2, GV-1
    if (ctx.C3 === 'geregelt' || ctx.C3 === 'informell') return [pool[2], pool[0]]; // GV-3, GV-1
    return [pool[0], pool[1]];                                           // GV-1, GV-2
  }
  if (dim === 'lernarchitektur') {
    if (ctx.C1 === 'integriert') return [pool[1], pool[2]];              // LA-2, LA-3
    if (ctx.C3 === 'restriktiv') return [pool[2], pool[0]];              // LA-3, LA-1
    return [pool[0], pool[1]];                                           // LA-1, LA-2
  }
  return pool.slice(0, 2);
}

function buildRecommendations(phase, scores, ctx, mode) {
  let ids = [];

  // Context overrides zuerst berechnen — werden von M6 genutzt
  const overrides = [];
  if (scores.kompetenzangst >= 34 && ctx.C1 === 'kein-einsatz') {
    overrides.push({ type: 'warn', key: 'angst-ohne-substanz', text: 'Angst ohne Substanz: Ihre Kompetenzangst-Werte deuten auf ein Narrativ-Problem hin, nicht auf einen Schulungsbedarf. Sinn vor Upskilling.' });
  }
  if (barrierPoint(scores) === 'sinnverlust' && ctx.C2 === 'automation') {
    overrides.push({ type: 'info', key: 'automation-narrativ', text: 'Das Automation-Narrativ ist die wahrscheinlichste Wurzel der Sinnverlust-Werte. SV-4 sollte Prioritaet 1 sein.' });
  }
  if (barrierPoint(scores) === 'tempostress' && ctx.C1 === 'explorativ') {
    overrides.push({ type: 'flag', key: 'projektion', text: 'Tempo-Stress bei geringem Einsatz deutet auf Projektion hin. Pruefen Sie: Messen Sie das Tempo an Ihrem Team oder an externen Erzaehlungen?' });
  }

  if (mode === 'deep') {
    // Deep-Check: bis zu 5 Empfehlungen — M8 Block-Priorisierung nach Top-Score
    const byDim = Object.entries(scores).filter(([k, v]) => k !== 'gesamt' && typeof v === 'number' && DIM_INTERVENTIONS[k]);
    byDim.sort((a, b) => b[1] - a[1]);

    const topA = byDim.find(([k]) => ['sinnverlust','kompetenzangst','fuehrungsvakuum','tempostress','entscheidungsangst'].includes(k));
    const topB = byDim.find(([k]) => ['eigenverantwortung','chancenbewusstsein'].includes(k));
    const topC = byDim.find(([k]) => ['strategische_klarheit','roi','daten_compliance','governance','lernarchitektur'].includes(k));

    // M8 + Fix B: Bloecke nach Score sortieren + kontext-sensitive Variante
    const slots = [];
    if (topA && topA[1] >= 34) slots.push({ dim: topA, recs: 2 });
    if (topB && topB[1] >= 34) slots.push({ dim: topB, recs: 1 });
    if (topC && topC[1] >= 34) slots.push({ dim: topC, recs: 2 });
    slots.sort((a, b) => b.dim[1] - a.dim[1]);
    for (const s of slots) {
      const selected = selectDimInterventions(s.dim[0], ctx, phase);
      ids.push(...selected.slice(0, s.recs));
    }

    if (ids.length < 3) {
      const phaseData = PHASE_INTERVENTIONS[phase] || {};
      ids = [...ids, ...(phaseData.primary || [])];
    }

    // M9: Override-Promotion auch im Deep-Mode
    const promote = (t) => {
      if (!ids.includes(t)) ids = [t, ...ids.slice(0, -1)];
      else ids = [t, ...ids.filter(x => x !== t)];
    };
    if (overrides.some(o => o.key === 'automation-narrativ')) promote('SV-4');
    if (overrides.some(o => o.key === 'angst-ohne-substanz')) promote('FV-4');

    // Fix A: OR-1 fuer VOR_SENSE/SENSE an Prio 1 injizieren
    if ((phase === 'VOR_SENSE' || phase === 'SENSE') && !ids.includes('OR-1')) {
      ids = ['OR-1', ...ids];
    }

    ids = [...new Set(ids)].slice(0, 5);
  } else {
    // Quick-Check: M3 (Barrier-sensitiv) + M4 (Multi-Barrier) + M6 (Override-Priorisierung)
    const phaseData = PHASE_INTERVENTIONS[phase] || {};
    const quickDims = ['sinnverlust','kompetenzangst','fuehrungsvakuum','tempostress'];
    const redDims = quickDims.filter(d => (scores[d] || 0) >= 67);
    const bp = barrierPoint(scores);

    if (phase === 'VOR_SENSE' || phase === 'SENSE' || phase === 'THRIVE') {
      // Fruehe/Reife Phasen: Phasen-Empfehlungen dominieren (Kontext vor Barrier)
      ids = [...(phaseData.primary || [])];
      if (ids.length < 3 && phaseData.secondary) ids = [...ids, ...phaseData.secondary];
    } else if (redDims.length >= 2) {
      // M4: Multi-Barrier — je 1 aus jedem Rot-Dim (kontext-sensitiv) + 1 Phasenstandard
      redDims.sort((a, b) => scores[b] - scores[a]);
      for (const d of redDims.slice(0, 3)) {
        const sel = selectDimInterventions(d, ctx, phase);
        if (sel[0]) ids.push(sel[0]);
      }
      const phaseStd = (phaseData.primary || []).find(p => !ids.includes(p));
      if (phaseStd) ids.push(phaseStd);
    } else {
      // M3: Barrier-sensitiv (kontext-sensitiv) — 2 aus Barrier-Dim + 1 aus Phase
      ids = selectDimInterventions(bp, ctx, phase).slice(0, 2);
      const phaseStd = (phaseData.primary || []).find(p => !ids.includes(p));
      if (phaseStd) ids.push(phaseStd);
      if (ids.length < 3) {
        ids = [...ids, ...(phaseData.primary || []).filter(p => !ids.includes(p))];
      }
    }

    // M6: Override-gesteuerte Priorisierung
    const promoteIfPresent = (targetId) => {
      if (!ids.includes(targetId)) {
        // Falls Ziel-Intervention nicht in Liste, hinzufuegen und davor die letzte entfernen
        ids = [targetId, ...ids.slice(0, -1)];
      } else {
        // Ziel ist drin, nach vorn sortieren
        ids = [targetId, ...ids.filter(x => x !== targetId)];
      }
    };
    if (overrides.some(o => o.key === 'automation-narrativ')) promoteIfPresent('SV-4');
    if (overrides.some(o => o.key === 'angst-ohne-substanz')) promoteIfPresent('FV-4');

    // Dedupe + limit
    ids = [...new Set(ids)].slice(0, redDims.length >= 2 ? 4 : 3);
  }

  return { ids, overrides };
}

/* ===================== COMPONENTS ===================== */

function Brand({ modeLabel }) {
  return h('div', { className: 'brand-header' },
    h('div', { className: 'dot' }),
    h('div', null, 'Mindshift AI'),
    h('div', { className: 'tag' }, modeLabel || 'KI-Team-Audit')
  );
}

function ProgressBar({ step, totalSteps }) {
  const pct = Math.max(0, Math.min(100, (step / totalSteps) * 100));
  return h('div', { className: 'progress' },
    h('div', { className: 'progress-bar', style: { width: pct + '%' } })
  );
}

function SingleChoice({ question, options, value, onChange }) {
  return h('div', { className: 'fade-in' },
    h('div', { className: 'question' }, question),
    h('div', { className: 'options' },
      options.map(opt => h('button', {
        key: opt.value,
        className: 'option' + (value === opt.value ? ' selected' : ''),
        onClick: () => onChange(opt.value),
        type: 'button',
      },
        h('div', { className: 'dot-box' }),
        h('span', null, opt.label)
      ))
    )
  );
}

function LikertBlock({ dimension, values, onChange }) {
  return h('div', { className: 'fade-in' },
    h('div', { className: 'kicker' }, 'Ihre Einschätzung'),
    h('div', { className: 'question' }, dimension.intro),
    ...dimension.items.map(item => h('div', { className: 'likert-row', key: item.id },
      h('div', { className: 'likert-q' }, item.text),
      h('div', { className: 'likert-scale' },
        [1,2,3,4,5].map(n => h('button', {
          key: n,
          className: 'likert-btn' + (values[item.id] === n ? ' selected' : ''),
          onClick: () => onChange(item.id, n),
          type: 'button',
        }, n))
      ),
      h('div', { className: 'likert-labels' },
        h('span', null, 'Trifft gar nicht zu'),
        h('span', null, 'Trifft voll zu')
      )
    ))
  );
}

function ShiftTrack({ current }) {
  const phases = ['VOR_SENSE','SENSE','HUMAN','IGNITE','FRAME','THRIVE'];
  const currentIdx = SHIFT_PHASES[current].index;
  const totalWidth = phases.length - 1;
  const fillPct = (currentIdx / totalWidth) * 100;
  return h('div', { className: 'shift-track' },
    h('div', { className: 'shift-rail' },
      h('div', { className: 'shift-fill', style: { width: fillPct + '%' } }),
      phases.map((p, i) => {
        const phaseData = SHIFT_PHASES[p];
        const state = i < currentIdx ? 'passed' : (i === currentIdx ? 'current' : 'ahead');
        return h('div', {
          key: p,
          className: 'shift-phase ' + state,
          style: { left: `${(i / totalWidth) * 100}%` }
        },
          h('div', { className: 'phase-dot' }),
          h('div', { className: 'phase-label' }, phaseData.shortLabel)
        );
      })
    )
  );
}

function DimBar({ label, score, zoneCls }) {
  const zoneLabel = { green: 'Unauffällig', yellow: 'Aufmerksamkeit', red: 'Kritisch' }[zoneCls] || '-';
  return h('div', { className: 'dim-bar-row' },
    h('div', { className: 'dim-label' }, label),
    h('div', { className: 'bar-track' },
      h('div', { className: 'bar-fill ' + zoneCls, style: { width: score + '%' } })
    ),
    h('div', { className: 'dim-score' }, score),
    h('div', { className: 'zone-label ' + zoneCls }, zoneLabel)
  );
}

function Recommendation({ ivId, number, isPrimary, why }) {
  const iv = INTERVENTIONS[ivId];
  if (!iv) return null;
  const numberBadge = `❶❷❸❹❺`[number-1] || number;
  return h('div', { className: 'recommendation' + (isPrimary ? ' primary' : '') , style: isPrimary ? { padding: 36, background: 'linear-gradient(165deg, var(--white), var(--cream))' } : {} },
    isPrimary && h('div', { style: {
      display: 'inline-block',
      padding: '6px 14px',

        h('div', { style: { color: 'var(--ink)', fontSize: '0.96rem', lineHeight: 1.5 } }, iv.steps[i] || '—')

    )
  );
}

/* ===================== MAIN APP ===================== */

function App() {
  const [mode, setMode] = useState(null);  // 'quick' | 'deep'
  const [step, setStep] = useState(0);
  const [answers, setAnswers] = useState({});
  const [variant, setVariant] = useState(null);
  const [email, setEmail] = useState('');

  // Dimensions for current mode
  const activeDims = mode === 'deep' ? DIMENSIONS : QUICK_DIMENSIONS;
  const numDimSteps = activeDims.length;
  // Steps: 0 welcome, 1 mode-already-chosen, 2 C1, 3..N Likert dims, N+1 Context end, N+2 Variant, N+3 Results
  // Structure: step 0 = welcome/mode-choice, step 1 = C1, step 2..(1+numDims) = likert dims
  // step 2+numDims = C2-C4, step 3+numDims = variant, step 4+numDims = results
  const LIKERT_START = 2;
  const CTX_END_STEP = LIKERT_START + numDimSteps;    // C2-C4
  const EMAIL_STEP = mode === 'deep' ? CTX_END_STEP + 1 : null;  // email only for deep
  const VARIANT_STEP = mode === 'deep' ? CTX_END_STEP + 2 : CTX_END_STEP + 1;
  const RESULTS_STEP = VARIANT_STEP + 1;
  const TOTAL_STEPS = RESULTS_STEP;

  const update = (key, val) => setAnswers(a => ({ ...a, [key]: val }));

  const canProceed = (() => {
    if (step === 0) return true;
    if (step === 1) return !!answers.C1;
    if (step >= LIKERT_START && step < CTX_END_STEP) {
      const dim = activeDims[step - LIKERT_START];
      return dim.items.every(it => answers[it.id]);
    }
    if (step === CTX_END_STEP) return !!answers.C2 && !!answers.C3 && !!answers.C4;
    if (step === EMAIL_STEP) return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email) || email === 'skip';
    if (step === VARIANT_STEP) return !!variant;
    return true;
  })();

  const scores = useMemo(() => step >= CTX_END_STEP ? computeScores(answers) : null, [answers, step, CTX_END_STEP]);
  const ctx = { C1: answers.C1, C2: answers.C2, C3: answers.C3, C4: answers.C4 };
  const phase = scores && scores.gesamt !== null ? mapShift(scores, ctx) : null;
  const bp = scores && scores.gesamt !== null ? barrierPoint(scores) : null;
  const recs = phase ? buildRecommendations(phase, scores, ctx, mode) : null;

  // Deep-Check: Block-Scores (A, B, C)
  const blockScores = useMemo(() => {
    if (mode !== 'deep' || step < CTX_END_STEP) return null;
    const score = (dimIds) => {
      const dims = DIMENSIONS.filter(d => dimIds.includes(d.id));
      const vals = [];
      dims.forEach(d => d.items.forEach(it => {
        if (answers[it.id]) vals.push(answers[it.id]);
      }));
      if (vals.length === 0) return 0;
      return Math.round(vals.reduce((a,b) => a+b, 0) * 100 / (vals.length * 5));
    };
    return {
      A: score(['sinnverlust','kompetenzangst','fuehrungsvakuum','tempostress','entscheidungsangst']),
      B: score(['eigenverantwortung','chancenbewusstsein']),
      C: score(['strategische_klarheit','roi','daten_compliance','governance','lernarchitektur']),
    };
  }, [answers, step, mode, CTX_END_STEP]);

  return h('div', { className: 'shell' },
    h(Brand, { modeLabel: mode === 'deep' ? 'Deep-Check · 12-15 Min' : mode === 'quick' ? 'Quick-Check · 3 Min' : 'KI-Team-Audit' }),
    step > 0 && step < RESULTS_STEP && h(ProgressBar, { step, totalSteps: TOTAL_STEPS }),

    /* ================= STEP 0 — WELCOME + MODE CHOICE ================= */
    step === 0 && h('div', { className: 'fade-in' },
      h('h1', { className: 'hero-text' },
        'Wie steht es um die ',
        h('em', null, 'KI-Reife'),
        ' Ihres Teams?'
      ),
      h('p', { className: 'hero-sub' },
        'Ein Self-Assessment für Führungskräfte im deutschen Mittelstand. Wählen Sie Ihren Einstieg:'
      ),
      h('div', { className: 'variant-grid', style: { marginTop: 32 } },
        h('button', { className: 'variant-card', onClick: () => { setMode('quick'); setStep(1); } },
          h('div', { className: 'kicker' }, 'Quick-Check · 3 Minuten'),
          h('h3', null, 'Der Mindset-Puls'),
          h('p', null, '12 Fragen zu Sinnverlust, Kompetenzangst, Führungsvakuum und Tempo-Stress. Anonym, ohne E-Mail, mit sofortiger SHIFT-Verortung.')
        ),
        h('button', { className: 'variant-card', onClick: () => { setMode('deep'); setStep(1); } },
          h('div', { className: 'kicker' }, 'Deep-Check · 12-15 Minuten'),
          h('h3', null, 'Der vollständige Check'),
          h('p', null, '36 Fragen — Mindset-Risiken, -Ressourcen und Business & Struktur (Strategie, ROI, EU AI Act, Governance, Lernarchitektur). Inkl. Roadmap.')
        )
      ),
      h('div', { className: 'hero-meta', style: { marginTop: 32 } },
        h('span', null, h('strong', null, 'Wissenschaftlich hergeleitet'), ' · UWES, JD-R, Technostress, Edmondson, EU AI Act'),
        h('span', null, h('strong', null, 'SHIFT-Verortung'), ' inklusive'),
        h('span', null, h('strong', null, 'Konkrete Empfehlungen'), ' für Ihre Phase')
      )
    ),

    /* ================= STEP 1 — C1 ================= */
    step === 1 && h('div', { className: 'card' },
      h('div', { className: 'kicker' }, mode === 'deep' ? 'Einstieg · Deep-Check' : 'Einstieg · Quick-Check'),
      h(SingleChoice, {
        question: CONTEXT_Q.C1.label,
        options: CONTEXT_Q.C1.options,
        value: answers.C1,
        onChange: (v) => update('C1', v),
      }),
      h('div', { className: 'actions' },
        h('button', { className: 'btn btn-ghost', onClick: () => { setMode(null); setStep(0); } }, '← Zurück'),
        h('button', { className: 'btn btn-primary', disabled: !canProceed, onClick: () => setStep(2) }, 'Weiter', h('span', null, '→'))
      )
    ),

    /* ================= LIKERT STEPS (generic) ================= */
    step >= LIKERT_START && step < CTX_END_STEP && h('div', { className: 'card' },
      h('div', { className: 'kicker' },
        `Dimension ${step - LIKERT_START + 1} von ${numDimSteps}`,
        activeDims[step - LIKERT_START].block && mode === 'deep' ?
          ` · Block ${activeDims[step - LIKERT_START].block} ${activeDims[step - LIKERT_START].block === 'A' ? '(Risiken)' : activeDims[step - LIKERT_START].block === 'B' ? '(Ressourcen)' : '(Struktur)'}` : ''
      ),
      h(LikertBlock, {
        dimension: activeDims[step - LIKERT_START],
        values: answers,
        onChange: update,
      }),
      h('div', { className: 'actions' },
        h('button', { className: 'btn btn-ghost', onClick: () => setStep(step - 1) }, '← Zurück'),
        h('button', { className: 'btn btn-primary', disabled: !canProceed, onClick: () => setStep(step + 1) }, 'Weiter', h('span', null, '→'))
      )
    ),

    /* ================= CTX_END — C2, C3, C4 ================= */
    step === CTX_END_STEP && h('div', { className: 'card' },
      h('div', { className: 'kicker' }, 'Kontext-Abschluss · 3 kurze Klicks'),
      h('div', { className: 'question' }, 'Damit wir Ihre Empfehlungen auf Ihre Situation abstimmen'),
      h(SingleChoice, { question: CONTEXT_Q.C2.label, options: CONTEXT_Q.C2.options, value: answers.C2, onChange: v => update('C2', v) }),
      h('div', { style: { marginTop: 24 } }),
      h(SingleChoice, { question: CONTEXT_Q.C3.label, options: CONTEXT_Q.C3.options, value: answers.C3, onChange: v => update('C3', v) }),
      h('div', { style: { marginTop: 24 } }),
      h(SingleChoice, { question: CONTEXT_Q.C4.label, options: CONTEXT_Q.C4.options, value: answers.C4, onChange: v => update('C4', v) }),
      h('div', { className: 'actions' },
        h('button', { className: 'btn btn-ghost', onClick: () => setStep(step - 1) }, '← Zurück'),
        h('button', { className: 'btn btn-primary', disabled: !canProceed, onClick: () => setStep(step + 1) }, mode === 'deep' ? 'Weiter' : 'Zur Auswertung', h('span', null, '→'))
      )
    ),

    /* ================= EMAIL STEP (Deep only) ================= */
    step === EMAIL_STEP && mode === 'deep' && h('div', { className: 'card' },
      h('div', { className: 'kicker' }, 'Ergebnis-Zugang'),
      h('h2', null, 'Ihr Deep-Check-Report'),
      h('p', { style: { marginTop: 12, marginBottom: 24, color: 'var(--stone-700)' } },
        'Damit Sie Ihr ausführliches Ergebnis inkl. Impact/Effort-Matrix und 60/90-Tage-Roadmap auch später nachlesen können, schicken wir es Ihnen gern als PDF zu. Optional – Sie können das Ergebnis auch einfach hier ansehen.'
      ),
      h('input', {
        type: 'email',
        placeholder: 'ihre.email@unternehmen.de',
        value: email === 'skip' ? '' : email,
        onChange: e => setEmail(e.target.value),
        style: {
          width: '100%',
          padding: '16px 20px',
          fontSize: '1rem',
          fontFamily: 'var(--ff-body)',
          border: '1.5px solid var(--stone-100)',
          borderRadius: 'var(--radius)',
          marginBottom: 12,
        }
      }),
      h('p', { style: { fontSize: '0.78rem', color: 'var(--stone-500)' } }, 'Keine Newsletter. Keine Weitergabe. Nur Ihr Report.'),
      h('div', { className: 'actions' },
        h('button', { className: 'btn btn-ghost', onClick: () => { setEmail('skip'); setStep(step + 1); } }, 'Ohne E-Mail fortfahren'),
        h('button', { className: 'btn btn-primary', disabled: !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email), onClick: () => setStep(step + 1) }, 'Weiter', h('span', null, '→'))
      )
    ),

    /* ================= VARIANT STEP ================= */
    step === VARIANT_STEP && h('div', { className: 'card' },
      h('div', { className: 'kicker' }, 'Fast geschafft'),
      h('h2', null, 'Wofür möchten Sie das Ergebnis nutzen?'),
      h('p', { style: { marginTop: 12, marginBottom: 32 } }, 'Sie können die Ansicht später jederzeit wechseln.'),
      h('div', { className: 'variant-grid' },
        h('button', { className: 'variant-card', onClick: () => { setVariant('self'); setStep(RESULTS_STEP); } },
          h('div', { className: 'icon' }, '◐'),
          h('h3', null, 'Für mich selbst'),
          h('p', null, 'Diagnoseprofil, SHIFT-Verortung und priorisierte Handlungsempfehlungen mit konkreten Schritten.')
        ),
        h('button', { className: 'variant-card', onClick: () => { setVariant('prep'); setStep(RESULTS_STEP); } },
          h('div', { className: 'icon' }, '◑'),
          h('h3', null, 'Als Gesprächsvorbereitung'),
          h('p', null, 'Gleiche Diagnose plus kuratierte Leitfragen für ein Gespräch mit Mindshift oder mit Ihrem Team.')
        )
      )
    ),

    /* ================= RESULTS ================= */
    step === RESULTS_STEP && scores && phase && h('div', { className: 'fade-in' },

      // SHIFT-Verortung (Hero)
      h('div', { className: 'card', style: { paddingBottom: 20 } },
        h('div', { className: 'kicker' }, 'Ihre SHIFT-Verortung'),
        h('h2', null, SHIFT_PHASES[phase].label),
        h('p', { style: { marginTop: 10 } }, SHIFT_PHASES[phase].narrative),
        h(ShiftTrack, { current: phase }),
        SHIFT_PHASES[phase].nextBreakpoint && h('div', { className: 'breakpoint-callout' },
          h('div', { className: 'kicker' }, 'Nächste Bruchstelle'),
          h('h3', null, `${SHIFT_PHASES[phase].shortLabel} → ${SHIFT_PHASES[SHIFT_PHASES[phase].nextBreakpoint].shortLabel}`),
          h('p', null, `Der nächste Schritt: ${SHIFT_PHASES[SHIFT_PHASES[phase].nextBreakpoint].summary}`)
        )
      ),

      // Block-Profile (nur Deep-Check)
      mode === 'deep' && blockScores && h('div', { className: 'card', style: { marginTop: 24 } },
        h('div', { className: 'kicker' }, 'Die drei Block-Profile'),
        h('h2', null, 'Mindset, Ressourcen, Struktur auf einen Blick'),
        h('p', { style: { marginTop: 10, color: 'var(--stone-700)' } },
          'Ihr Deep-Check liefert drei separate Profile. Niedrige Werte = günstig. Bei Block B bedeutet niedrig: Ressourcen sind vorhanden.'

        h('div', { style: { marginTop: 20 } },
          h(DimBar, { label: 'A · Mindset-Risiken',    score: blockScores.A, zoneCls: zone(blockScores.A) }),
          h(DimBar, { label: 'B · Mindset-Ressourcen', score: blockScores.B, zoneCls: zone(blockScores.B) }),
          h(DimBar, { label: 'C · Business & Struktur', score: blockScores.C, zoneCls: zone(blockScores.C) })
        )
      ),

      // Diagnoseprofil
      h('div', { className: 'card', style: { marginTop: 24 } },
        h('div', { className: 'kicker' }, 'Diagnoseprofil'),
        h('h2', null, mode === 'deep' ? 'Alle Dimensionen im Detail' : 'Die 4 Dimensionen im Überblick'),
        h('div', { style: { marginTop: 20 } },
          ...activeDims.map(d => h(DimBar, { key: d.id, label: d.label, score: scores[d.id], zoneCls: zone(scores[d.id]) })),
          h('div', { style: { marginTop: 20, paddingTop: 16, borderTop: '1px solid var(--stone-100)' } },

      ),

      // Kontext-Einordnung
      h('div', { className: 'card', style: { marginTop: 24, background: 'var(--cream)' } },
        h('div', { className: 'kicker' }, 'Kontext'),
        h('h3', null, 'Was Ihre Kontextantworten über den Score erzählen'),
        h('p', { style: { marginTop: 10 } },
          `Einsatztiefe: ${CONTEXT_Q.C1.options.find(o => o.value === ctx.C1).label.split('–')[0].trim()} · `,
          `Ziel: ${CONTEXT_Q.C2.options.find(o => o.value === ctx.C2).label.split('–')[0].trim()} · `,
          `Regelung: ${CONTEXT_Q.C3.options.find(o => o.value === ctx.C3).label.split('–')[0].trim()} · `,
          `Befähigung: ${CONTEXT_Q.C4.options.find(o => o.value === ctx.C4).label.split('–')[0].trim()}`
        ),
        recs.overrides.length > 0 && h('div', { style: { marginTop: 16 } },
          recs.overrides.map((o, i) => h('div', { key: i, style: {
            background: o.type === 'flag' ? 'var(--red-soft)' : 'var(--navy)',
            color: 'var(--white)',
            padding: '14px 18px',
            borderRadius: '10px',
            marginTop: 8,
            fontSize: '0.92rem',
            lineHeight: 1.5,
          } }, o.text))
        )
      ),

      // Empfehlungen
      h('div', { className: 'section-title' }, '3 priorisierte Handlungsempfehlungen'),
      h('p', { style: { marginTop: -8, marginBottom: 20, color: 'var(--stone-700)', fontSize: '0.95rem', maxWidth: 720 } },
        'Die folgenden Maßnahmen beschreiben, ',
        h('strong', null, 'was zu tun wäre'),
        '. Ob sie greifen, hängt nicht an der Maßnahme selbst, sondern daran, wer sie im Unternehmen führt.'
      ),
      recs.ids.map((id, i) => h(Recommendation, {
        key: id,
        ivId: id,
        number: i + 1,
        isPrimary: i === 0,
        why: i === 0 ? `Warum Priorität 1: Passt zu Ihrer SHIFT-Phase ${SHIFT_PHASES[phase].shortLabel} und adressiert Ihren Barrier Point (${DIMENSIONS.find(d => d.id === bp).label}).` : null,
      })),

      // Peer-Benchmark (Placeholder - wird mit echten Daten ersetzt)
      h('div', { className: 'card', style: { marginTop: 24, background: 'var(--off-white)' } },
        h('div', { className: 'kicker' }, 'Im Vergleich mit anderen Teams'),
        h('h3', { style: { fontSize: '1.1rem', marginBottom: 12 } }, 'Wie Sie sich einordnen'),
        h('div', { style: { display: 'flex', flexWrap: 'wrap', gap: 24, marginTop: 16 } },
          h('div', { style: { flex: '1 1 220px' } },
            h('div', { style: { fontSize: '2rem', fontFamily: 'var(--ff-display)', color: 'var(--navy)', fontWeight: 700 } },
              scores.gesamt > 66 ? 'oberes Drittel' : scores.gesamt > 33 ? 'mittleres Drittel' : 'unteres Drittel'
            ),
            h('div', { style: { fontSize: '0.88rem', color: 'var(--stone-500)', marginTop: 4 } }, 'der gemessenen Risikowerte')
          ),
          h('div', { style: { flex: '1 1 220px' } },
            h('div', { style: { fontSize: '2rem', fontFamily: 'var(--ff-display)', color: 'var(--navy)', fontWeight: 700 } },
              scores.kompetenzangst > 66 ? '~62%' : scores.kompetenzangst > 33 ? '~48%' : '~22%'
            ),
            h('div', { style: { fontSize: '0.88rem', color: 'var(--stone-500)', marginTop: 4 } }, 'mittelständischer Teams zeigen ähnliche Kompetenzangst-Signale')
          )
        ),
        h('p', { style: { fontSize: '0.82rem', color: 'var(--stone-500)', marginTop: 16, fontStyle: 'italic' } }, 'Indikative Richtwerte — werden mit wachsender Audit-Basis präziser. Grundlage: Bitkom KI-Studien 2024-25, Fraunhofer IAO, erste Mindshift-Pilotdaten.')
      ),

      // Variante A: Reflexion (Zeitplan ist jetzt in Priorität 1 integriert)
      variant === 'self' && h(React.Fragment, null,
        h('div', { className: 'reflection' },
          h('div', { className: 'kicker' }, 'Ein Gedanke zum Weiterdenken'),
          h('p', null,
            phase === 'HUMAN'    ? '„Wenn Ihr Team Sie jetzt fragen würde: Werden wir durch KI wertvoller oder überflüssiger? – wie antworten Sie? Und wie stimmt diese Antwort mit Ihren letzten drei Entscheidungen überein?"' :
            phase === 'IGNITE'   ? '„Wann haben Sie zuletzt einen Mitarbeitenden erlebt, der durch KI sichtbar begeistert war – und was hatten Sie konkret dazu beigetragen?"' :
            phase === 'FRAME'    ? '„Wenn Sie morgen ein KI-Tool in Ihrem Team abschalten müssten – welches wäre es, und warum trauen Sie sich das heute nicht?"' :
            phase === 'SENSE'    ? '„Was wissen Sie über den KI-Stand Ihres Teams aus eigener Beobachtung – und was nur aus Berichten anderer?"' :
            phase === 'VOR_SENSE'? '„Was ist der konkrete Auslöser, warum Sie gerade jetzt diesen Audit gemacht haben – und was sagt das über Ihren nächsten Schritt?"' :
            '„Welche Form der Herausforderung brauchen Sie und Ihr Team jetzt noch, um weiter zu lernen – oder werden Sie bequem?"'
          )
        )
      ),

      // Variante B: Leitfragen
      variant === 'prep' && h(React.Fragment, null,
        h('div', { className: 'section-title' }, 'Leitfragen für Ihr Gespräch'),
        h(LeitfragenBlock, { phase, audience: 'mindshift' }),
        h(LeitfragenBlock, { phase, audience: 'team' })
      ),

      // Führungs-Framing (Brücke zum CTA)
      h('div', { className: 'card', style: { marginTop: 32, background: 'var(--cream)', borderLeft: '4px solid var(--gold)' } },
        h('div', { className: 'kicker' }, 'Was Ihr Ergebnis wirklich zeigt'),
        h('h3', { style: { marginBottom: 12 } }, 'Das ist kein Umsetzungsproblem. Das ist ein Führungsproblem im KI-Zeitalter.'),
        h('p', { style: { marginBottom: 12 } },
          'Die Tools sind verfügbar. Die Maßnahmen sind bekannt. Was fehlt, ist nicht Wissen — sondern jemand, der den Wandel im Führungsalltag tatsächlich orchestriert: zwischen Geschäftsführung, Fachbereichen, IT und Mitbestimmung.'
        ),
        h('p', { style: { marginBottom: 0, fontStyle: 'italic', color: 'var(--navy)' } },
          'Genau an diesem Punkt kommen Geschäftsführer auf mich zu.'
        )
      ),

      // CTA: Reality Check (geschärft)
      h('div', { className: 'cta-box', style: { marginTop: 24 } },
        h('div', { className: 'kicker' }, '30-Minuten Reality Check'),
        h('h3', null, 'Für Geschäftsführer, die wissen wollen, wo sie wirklich stehen.'),
        h('p', { style: { marginBottom: 16 } },
          'Dreißig Minuten mit Dirk Brusch — Interim KI-Transformations-Manager. Drei Dinge: Einordnung Ihres Ergebnisses, ehrlicher Spiegel Ihrer Situation, klarer nächster Schritt.'
        ),
        h('p', { style: { marginBottom: 24, fontSize: '0.92rem', color: 'rgba(255,255,255,0.7)' } },
          'Kein Vertrieb. Keine Pakete. Wenn wir nicht zusammenpassen, bekommen Sie eine Empfehlung, wer besser passt.'
        ),
        h('button', { className: 'btn btn-gold', onClick: () => alert('Terminbuchung — in der finalen Version verbunden mit Cal.com') }, 'Reality Check vereinbaren', h('span', null, '→')),
        h('div', { className: 'cta-note' }, 'Aktuell 4 Slots im Kalender von Dirk Brusch · Nur für Geschäftsführer und Bereichsleiter mit Ergebnisverantwortung.')
      ),

      h('div', { className: 'actions', style: { marginTop: 40 } },
        h('button', { className: 'btn btn-ghost', onClick: () => {
          setVariant(variant === 'self' ? 'prep' : 'self');
        } }, variant === 'self' ? '→ Zur Gesprächsvorbereitung wechseln' : '→ Zur Selbstausfüll-Ansicht wechseln'),
        h('button', { className: 'btn btn-ghost', onClick: () => { setStep(0); setAnswers({}); setVariant(null); setMode(null); setEmail(''); } }, 'Audit neu starten')
      ),

      // Methodik — Wie dieser Audit entstand
      h('div', { style: { marginTop: 48, padding: '32px 28px', background: 'var(--navy)', color: 'var(--white)', borderRadius: 'var(--radius-lg)' } },
        h('div', { className: 'kicker', style: { color: 'var(--gold-light)', marginBottom: 12 } }, 'Wie dieser Audit entstand'),
        h('h3', { style: { color: 'var(--white)', marginBottom: 16 } }, 'Nicht aus dem Bauch — aus der Literatur'),
        h('div', { style: { display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(140px, 1fr))', gap: 20, marginBottom: 20 } },
          [
            [mode === 'deep' ? '12' : '4', 'Dimensionen'],
            [mode === 'deep' ? '36' : '12', 'Likert-Items'],
            [mode === 'deep' ? '40+' : '16+', 'Handlungsempfehlungen'],
            ['50+', 'wissenschaftliche Quellen'],
          ].map(([n, l], i) => h('div', { key: i },
            h('div', { style: { fontSize: '2.2rem', fontFamily: 'var(--ff-display)', fontWeight: 700, color: 'var(--gold)', lineHeight: 1 } }, n),
            h('div', { style: { fontSize: '0.82rem', color: 'rgba(255,255,255,0.72)', marginTop: 6 } }, l)
          ))
        ),
        h('p', { style: { fontSize: '0.88rem', color: 'rgba(255,255,255,0.82)', lineHeight: 1.6, marginBottom: 16 } },
          'Jedes Item ist auf einer validierten wissenschaftlichen Skala aufgebaut. Die Empfehlungen sind aus 8 Deep-Research-Reports zu Arbeitspsychologie, Technostress, Psychologischer Sicherheit, Change Management, Digital Leadership, Business-Adoption und EU AI Act extrahiert. Der deutsche Mittelstandskontext (CYA-Logik, Mitbestimmung, Sozialpartnerschaft) ist explizit integriert.'
        ),
        h('details', { style: { color: 'rgba(255,255,255,0.72)', fontSize: '0.82rem' } },
          h('summary', { style: { cursor: 'pointer', color: 'var(--gold-light)' } }, 'Quellen im Detail'),
          h('p', { style: { marginTop: 12, lineHeight: 1.7 } },
            'Schaufeli (UWES) · Bakker/Demerouti (JD-R) · Tarafdar (Technostress) · Maier/Weitzel (Bamberg) · Gimpel (Fraunhofer FIT) · Edmondson (Fearless Organization) · Clark (4 Stages of Psychological Safety) · Dweck (Mindset) · Bandura (Self-Efficacy) · Gigerenzer (Risk Literacy) · Welpe (Digital Leadership Scale TUM) · Gratton (Redesigning Work) · Hofert (New Work) · Rafferty/Jimmieson/Armenakis (Change Readiness) · Holt (ROCS) · Prosci (ADKAR) · Brynjolfsson (Stanford Digital Economy Lab) · Mollick (Wharton · Co-Intelligence) · Grant (Task Significance) · Klotz (Great Resignation) · Bischoff (Mindshift-Praxis) · Hampel (Fehlerkultur deutscher Mittelstand) · EU AI Act · DSGVO · ISO 42001 · BetrVG · McKinsey/BCG/Gartner/MIT (AI Adoption Research).'
          )
        )
      ),

      h('div', { className: 'footer-meta' },
        `Mindshift AI · KI-Team-Audit · Prototyp v0.2 · Modus: ${mode === 'deep' ? 'Deep-Check' : 'Quick-Check'}`
      )
    )
  );
}

createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
</html>
